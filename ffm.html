<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>Protected — Mischa vd Goes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        .staticrypt-html,
        .staticrypt-body {
            height: 100%;
            margin: 0;
        }

        .staticrypt-content {
            height: 100%;
            background: #131417;
            font-family: "Onest", sans-serif;
            color: #DADADA;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-page {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .staticrypt-form {
            background: #1c1f24;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
        }

        .staticrypt-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 0.4rem;
            letter-spacing: -0.01em;
        }

        .staticrypt-instructions p:not(.staticrypt-title) {
            font-size: 0.875rem;
            color: #888;
            margin: 0 0 1.5rem;
        }

        .staticrypt-hr {
            border: 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 0 0 1.5rem;
        }

        .staticrypt-password-container {
            position: relative;
            background: #0e1013;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] {
            background: transparent;
            border: 0;
            color: #DADADA;
            font-family: "Onest", sans-serif;
            font-size: 0.9rem;
            outline: 0;
            padding: 0.85rem 2.5rem 0.85rem 1rem;
            width: 100%;
        }

        .staticrypt-form input[type="password"]::placeholder,
        .staticrypt-form input[type="text"]::placeholder {
            color: #555;
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 18px;
            opacity: 0.4;
            padding: 0;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            filter: invert(1);
        }

        .staticrypt-toggle-password-visibility:hover {
            opacity: 0.7;
        }

        .staticrypt-decrypt-button {
            background: #5856D6;
            border: 0;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            font-family: "Onest", sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 0.85rem 1rem;
            width: 100%;
            transition: background 0.15s;
        }

        .staticrypt-decrypt-button:hover,
        .staticrypt-decrypt-button:focus {
            background: #4c4ac3;
            outline: none;
        }

        .staticrypt-decrypt-button:active {
            background: #413faa;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #666;
            gap: 0.5rem;
        }

        .staticrypt-remember input[type="checkbox"] {
            accent-color: #5856D6;
        }

        .hidden { display: none !important; }

        /* Spinner */
        .staticrypt-spinner-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #131417;
        }

        .staticrypt-spinner {
            width: 2rem;
            height: 2rem;
            border: 2px solid rgba(88, 86, 214, 0.2);
            border-top-color: #5856D6;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Branding */
        .staticrypt-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .staticrypt-brand span {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #5856D6;
        }
    </style>
</head>
<body class="staticrypt-body">

    <div id="staticrypt_loading" class="staticrypt-spinner-container">
        <div class="staticrypt-spinner"></div>
    </div>

    <div id="staticrypt_content" class="staticrypt-content hidden">
        <div class="staticrypt-page">
            <div class="staticrypt-brand">
                <span>Mischa vd Goes</span>
            </div>
            <div class="staticrypt-form">
                <div class="staticrypt-instructions">
                    <p class="staticrypt-title">Protected Case Study</p>
                    <p>Enter the password to view this page.</p>
                </div>

                <hr class="staticrypt-hr" />

                <form id="staticrypt-form" action="#" method="post">
                    <div class="staticrypt-password-container">
                        <input
                            id="staticrypt-password"
                            type="password"
                            name="password"
                            placeholder="Password"
                            autofocus
                        />
                        <img
                            id="staticrypt-toggle-password-visibility-icon"
                            class="staticrypt-toggle-password-visibility"
                            src=""
                            alt="Toggle password visibility"
                            onclick="StaticCryptPomise.then(sc => sc.togglePasswordVisibility())"
                        />
                    </div>

                    <label class="staticrypt-remember hidden">
                        <input id="staticrypt-remember" type="checkbox" />
                        Remember me
                    </label>

                    <input
                        class="staticrypt-decrypt-button"
                        type="submit"
                        value="View Case Study"
                    />
                </form>

                <div id="staticrypt-message" class="hidden" style="margin-top:1rem;color:#ff6b6b;font-size:0.8rem;">
                    Incorrect password.
                </div>
            </div>
        </div>
    </div>

    <!-- staticrypt: scripts -->
</body>
</html>
