            .staticrypt-form input[type="password"]::placeholder,

                color: #aaa;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                opacity: 0.3;
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                width: 16px;
                filter: none;
            }

            .staticrypt-toggle-password-visibility:hover { opacity: 0.6; }

            .staticrypt-form .staticrypt-decrypt-button {
                background: #5856D6;
                border: 0;
                border-radius: 8px;
                color: #ffffff;
                cursor: pointer;
                font-family: "Onest", sans-serif;
                font-size: 0.875rem;
                font-weight: 600;
                letter-spacing: 0.02em;
                outline: 0;
                padding: 0.85rem 1rem;
                width: 100%;
                transition: filter 0.15s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #5856D6;
                filter: brightness(115%);

                align-items: center;
                justify-content: center;
                margin-bottom: 0.75rem;
                font-size: 0.8rem;
                color: #888;
                gap: 0.5rem;
            }

            .staticrypt-remember input[type="checkbox"] {
                accent-color: #5856D6;
            }

            .staticrypt-helper {
                margin-top: 1.75rem;
                text-align: center;
            }

            .staticrypt-helper p {
                font-size: 0.8rem;
                color: #999;
                margin: 0 0 0.75rem;
            }

                gap: 0.5rem;
                justify-content: center;
                flex-wrap: wrap;
                margin-bottom: 1.25rem;
            }

            .staticrypt-helper-links a {
                font-size: 0.78rem;
                color: #444;
                text-decoration: none;
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 0.35rem 0.75rem;
                transition: border-color 0.15s, color 0.15s;
            }

            .staticrypt-helper-links a:hover {
                border-color: #5856D6;
                color: #5856D6;
            }

            .staticrypt-divider {
                border: 0;
                border-top: 1px solid #ebebeb;
                margin: 0 0 1.25rem;

                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: #bbb;
                margin: 0 0 0.75rem;

            .staticrypt-projects {

                gap: 0.5rem;
                justify-content: center;
                flex-wrap: wrap;

            .staticrypt-projects a {
                font-size: 0.78rem;
                color: #444;
                text-decoration: none;
                background: #fff;
                border: 1px solid #e5e5e5;
                border-radius: 6px;
                padding: 0.35rem 0.75rem;
                transition: border-color 0.15s, color 0.15s;
            }

            .staticrypt-projects a:hover {
                border-color: #5856D6;
                color: #5856D6;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f8f8f8;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 2px solid rgba(88, 86, 214, 0.2);
                border-right-color: #5856D6;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }

                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
